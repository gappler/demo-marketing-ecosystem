<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yowie Brand Configuration Viewer</title>
  <style>
    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #12122a;
      --bg-selector: #16213e;
      --text-primary: #ccd6f6;
      --text-secondary: #8892b0;
      --accent-gold: #e2c87d;
      --accent-teal: #64ffda;
      --accent-red: #ff6b6b;
      --border: rgba(255,255,255,0.08);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 32px 24px 16px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent-gold);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    header p {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    #selector-bar {
      background: var(--bg-selector);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      max-width: 960px;
      margin: 0 auto 24px;
      border-radius: 8px;
    }

    .selector-group {
      margin-bottom: 12px;
    }

    .selector-group:last-child {
      margin-bottom: 0;
    }

    .selector-group-label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .selector-group .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .selector-row {
      display: flex;
      gap: 24px;
    }

    .selector-row .selector-group {
      flex: 1;
    }

    button[data-group] {
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    button[data-group]:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }

    button[data-group].active {
      background: var(--accent-gold);
      color: #0a0a1a;
      font-weight: 600;
      border-color: var(--accent-gold);
    }

    button[data-group].dimmed {
      opacity: 0.35;
      cursor: default;
      border-bottom-style: dashed;
    }

    button[data-group].dimmed:hover {
      opacity: 0.5;
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
    }

    button[data-group].dimmed.active {
      opacity: 0.6;
    }

    #rules-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 960px;
      margin: 0 auto 24px;
      padding: 0 24px;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .card-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-gold);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .card h3 {
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .card p, .card li {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .card ul {
      list-style: none;
      padding: 0;
    }

    .card ul li {
      padding: 3px 0;
    }

    .sub-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .sub-section-title {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .pillar-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 4px 0;
    }

    .pillar-dot {
      flex-shrink: 0;
      font-size: 0.75rem;
    }

    .pillar-primary {
      opacity: 1;
    }

    .pillar-secondary {
      opacity: 0.5;
    }

    .pillar-headline {
      font-size: 0.85rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    .pillar-resonance {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-style: italic;
      margin-left: 20px;
      margin-top: 2px;
    }

    .term-approved {
      color: var(--accent-teal);
    }

    .term-forbidden {
      color: var(--accent-red);
      text-decoration: line-through;
    }

    .term-conditional {
      color: #f0c040;
    }

    .term-note {
      color: var(--text-secondary);
      font-size: 0.78rem;
      margin-left: 4px;
    }

    #copy-preview {
      max-width: 960px;
      margin: 0 auto 48px;
      padding: 0 24px;
    }

    #copy-preview .card-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-gold);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .copy-blockquote {
      border-left: 3px solid var(--accent-gold);
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-radius: 0 8px 8px 0;
      margin-bottom: 16px;
    }

    .copy-blockquote p {
      font-size: 0.9rem;
      color: var(--text-primary);
      line-height: 1.7;
    }

    .rules-demonstrated {
      list-style: none;
      padding: 0;
    }

    .rules-demonstrated li {
      font-size: 0.8rem;
      color: var(--text-secondary);
      padding: 3px 0;
    }

    .rules-demonstrated li::before {
      content: "\2192 ";
      color: var(--accent-gold);
    }

    .no-example {
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-style: italic;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px dashed var(--border);
    }

    .no-example .rule-summary {
      margin-top: 12px;
      font-style: normal;
      font-size: 0.8rem;
    }

    .attribute-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .attribute-chip {
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
    }

    @media (max-width: 768px) {
      #rules-panel {
        grid-template-columns: 1fr;
      }

      .selector-row {
        flex-direction: column;
        gap: 0;
      }

      header h1 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

  <script>
    const state = {
      product: 'basecamp_45l',
      audience: 'backcountry_hikers',
      channel: 'product_page'
    };

    function productHasAudience(product, audience) {
      for (var ch in CONFIG.voice.channels) {
        if (CONFIG.examples[product + '|' + audience + '|' + ch]) return true;
      }
      return false;
    }

    function productHasChannel(product, channel) {
      for (var aud in CONFIG.audiences) {
        if (CONFIG.examples[product + '|' + aud + '|' + channel]) return true;
      }
      return false;
    }

    function firstValidAudience(product) {
      for (var aud in CONFIG.audiences) {
        if (productHasAudience(product, aud)) return aud;
      }
      return state.audience;
    }

    function firstValidChannel(product) {
      for (var ch in CONFIG.voice.channels) {
        if (productHasChannel(product, ch)) return ch;
      }
      return state.channel;
    }

    function selectOption(group, value) {
      state[group] = value;
      if (group === 'product') {
        if (!productHasAudience(state.product, state.audience)) {
          state.audience = firstValidAudience(state.product);
        }
        if (!productHasChannel(state.product, state.channel)) {
          state.channel = firstValidChannel(state.product);
        }
      }
      ['product', 'audience', 'channel'].forEach(function(g) {
        document.querySelectorAll('[data-group="' + g + '"]').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.value === state[g]);
        });
      });
      updateDisplay();
      updateHash();
    }

    function updateButtonDimState() {
      document.querySelectorAll('button[data-group="audience"]').forEach(function(btn) {
        btn.classList.toggle('dimmed', !productHasAudience(state.product, btn.dataset.value));
      });
      document.querySelectorAll('button[data-group="channel"]').forEach(function(btn) {
        btn.classList.toggle('dimmed', !productHasChannel(state.product, btn.dataset.value));
      });
    }

    function updateHash() {
      window.location.hash = 'product=' + state.product + '&audience=' + state.audience + '&channel=' + state.channel;
    }

    function loadFromHash() {
      var hash = window.location.hash.slice(1);
      if (!hash) return;
      var params = new URLSearchParams(hash);
      if (params.get('product') && CONFIG.products[params.get('product')]) state.product = params.get('product');
      if (params.get('audience') && CONFIG.audiences[params.get('audience')]) state.audience = params.get('audience');
      if (params.get('channel') && CONFIG.voice.channels[params.get('channel')]) state.channel = params.get('channel');
      ['product', 'audience', 'channel'].forEach(function(group) {
        document.querySelectorAll('[data-group="' + group + '"]').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.value === state[group]);
        });
      });
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function updateDisplay() {
      updateButtonDimState();
      updateVoiceCard();
      updateMessagingCard();
      updateTerminologyCard();
      updateComplianceCard();
      updateCopyPreview();
    }

    function updateVoiceCard() {
      var channel = CONFIG.voice.channels[state.channel];
      var adaptationMode = CONFIG.audiences[state.audience].voice_adaptation;
      var adaptation = CONFIG.voice.audience_adaptations[adaptationMode];
      var attrs = Object.keys(CONFIG.voice.core_attributes);

      var html = '<div class="card-label">Voice</div>';
      html += '<h3>' + escapeHtml(channel.register) + '</h3>';
      html += '<ul>';
      channel.rules.forEach(function(r) {
        html += '<li>' + escapeHtml(r) + '</li>';
      });
      html += '</ul>';

      html += '<div class="sub-section">';
      html += '<div class="sub-section-title">Audience Adaptation: ' + escapeHtml(adaptationMode) + '</div>';
      html += '<p>' + escapeHtml(adaptation.approach) + '</p>';
      html += '</div>';

      html += '<div class="sub-section">';
      html += '<div class="sub-section-title">Assumed Knowledge</div>';
      html += '<ul>';
      adaptation.assumed_knowledge.forEach(function(k) {
        html += '<li>' + escapeHtml(k) + '</li>';
      });
      html += '</ul>';
      html += '</div>';

      html += '<div class="sub-section">';
      html += '<div class="sub-section-title">Core Attributes</div>';
      html += '<div class="attribute-chips">';
      attrs.forEach(function(a) {
        html += '<span class="attribute-chip">' + escapeHtml(a) + '</span>';
      });
      html += '</div>';
      html += '</div>';

      document.getElementById('voice-card').innerHTML = html;
    }

    function updateMessagingCard() {
      var product = CONFIG.products[state.product];
      var productLine = product.line;
      var productEmphasis = CONFIG.messaging.product_emphasis[productLine];
      var audienceEmphasis = CONFIG.messaging.audience_emphasis[state.audience];
      var adaptationMode = CONFIG.audiences[state.audience].voice_adaptation;

      // Compute combined ranks
      var pillarKeys = Object.keys(CONFIG.messaging.pillars);
      var ranked = pillarKeys.map(function(key) {
        var pIdx = productEmphasis.indexOf(key);
        var aIdx = audienceEmphasis.indexOf(key);
        if (pIdx === -1) pIdx = pillarKeys.length;
        if (aIdx === -1) aIdx = pillarKeys.length;
        return { key: key, rank: (pIdx + aIdx) / 2 };
      });
      ranked.sort(function(a, b) {
        if (a.rank !== b.rank) return a.rank - b.rank;
        return audienceEmphasis.indexOf(a.key) - audienceEmphasis.indexOf(b.key);
      });

      var html = '<div class="card-label">Messaging Pillars</div>';
      html += '<p style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:10px;">' +
        escapeHtml(product.name) + ' (' + escapeHtml(productLine) + ') + ' +
        escapeHtml(CONFIG.audiences[state.audience].name) + '</p>';

      ranked.forEach(function(item, i) {
        var pillar = CONFIG.messaging.pillars[item.key];
        var isPrimary = i < 2;
        var cls = isPrimary ? 'pillar-primary' : 'pillar-secondary';
        var dot = isPrimary ? '\u25cf' : '\u25cb';

        html += '<div class="pillar-item ' + cls + '">';
        html += '<span class="pillar-dot">' + dot + '</span>';
        html += '<span class="pillar-headline">' + escapeHtml(pillar.headline) + '</span>';
        html += '</div>';
        if (pillar.resonance[adaptationMode]) {
          html += '<div class="pillar-resonance ' + cls + '">' + escapeHtml(pillar.resonance[adaptationMode]) + '</div>';
        }
      });

      document.getElementById('messaging-card').innerHTML = html;
    }

    function updateTerminologyCard() {
      var html = '<div class="card-label">Terminology</div>';

      html += '<div class="sub-section-title">Approved</div>';
      html += '<ul>';
      CONFIG.terminology.approved.forEach(function(t) {
        html += '<li><span class="term-approved">\u2713 ' + escapeHtml(t.term) + '</span> <span class="term-note">' + escapeHtml(t.note) + '</span></li>';
      });
      html += '</ul>';

      html += '<div class="sub-section">';
      html += '<div class="sub-section-title">Forbidden</div>';
      html += '<ul>';
      CONFIG.terminology.forbidden.forEach(function(t) {
        html += '<li><span class="term-forbidden">\u2717 ' + escapeHtml(t.term) + '</span> <span class="term-note">' + escapeHtml(t.reason) + '</span></li>';
      });
      html += '</ul>';
      html += '</div>';

      html += '<div class="sub-section">';
      html += '<div class="sub-section-title">Conditional</div>';
      html += '<ul>';
      CONFIG.terminology.conditional.forEach(function(t) {
        html += '<li><span class="term-conditional">\u26a0 ' + escapeHtml(t.term) + '</span> <span class="term-note">' + escapeHtml(t.rule) + '</span></li>';
      });
      html += '</ul>';
      html += '</div>';

      document.getElementById('terminology-card').innerHTML = html;
    }

    function updateComplianceCard() {
      var html = '<div class="card-label">Compliance</div>';
      var rules = [
        { ok: false, text: 'No exclamation points' },
        { ok: false, text: 'No superlatives without evidence' },
        { ok: false, text: 'No lifestyle imagery or aspirational framing' },
        { ok: false, text: 'No influencer partnerships' },
        { ok: false, text: 'No studio shots \u2014 field photos only' },
        { ok: true, text: 'Minimal logo placement' },
        { ok: true, text: 'Eco claims stated as fact, not marketing' },
        { ok: true, text: 'Minimal packaging \u2014 described factually when relevant' }
      ];

      html += '<ul>';
      rules.forEach(function(r) {
        if (r.ok) {
          html += '<li><span class="term-approved">\u2713</span> ' + escapeHtml(r.text) + '</li>';
        } else {
          html += '<li><span class="term-forbidden" style="text-decoration:none">\u2717</span> ' + escapeHtml(r.text) + '</li>';
        }
      });
      html += '</ul>';

      document.getElementById('compliance-card').innerHTML = html;
    }

    function updateCopyPreview() {
      var key = state.product + '|' + state.audience + '|' + state.channel;
      var example = CONFIG.examples[key];
      var container = document.getElementById('copy-content');
      var html;

      if (example) {
        html = '<div class="copy-blockquote"><p>' + escapeHtml(example.copy) + '</p></div>';
        html += '<ul class="rules-demonstrated">';
        example.rules_demonstrated.forEach(function(r) {
          html += '<li>' + escapeHtml(r) + '</li>';
        });
        html += '</ul>';
        container.innerHTML = html;
      } else {
        var channel = CONFIG.voice.channels[state.channel];
        var adaptationMode = CONFIG.audiences[state.audience].voice_adaptation;
        var audienceDimmed = !productHasAudience(state.product, state.audience);
        var channelDimmed = !productHasChannel(state.product, state.channel);
        html = '<div class="no-example">';
        if (audienceDimmed || channelDimmed) {
          var axisLabel = audienceDimmed && channelDimmed ? 'audience or channel'
            : audienceDimmed ? 'audience' : 'channel';
          html += '<p><strong>' + escapeHtml(CONFIG.products[state.product].name) +
            '</strong> isn\u2019t marketed to this ' + axisLabel + ' combination: <strong>' +
            escapeHtml(CONFIG.audiences[state.audience].name) + '</strong> + <strong>' +
            escapeHtml(state.channel.replace(/_/g, ' ')) + '</strong>.</p>';
          html += '<p style="margin-top:8px;">The voice rules, pillar rankings, and terminology above still apply \u2014 but no copy example exists because this pairing wouldn\u2019t occur in practice.</p>';
        } else {
          html += 'No example for this combination: <strong>' +
            escapeHtml(CONFIG.products[state.product].name) + '</strong> + <strong>' +
            escapeHtml(CONFIG.audiences[state.audience].name) + '</strong> + <strong>' +
            escapeHtml(state.channel.replace(/_/g, ' ')) + '</strong>';
          html += '<div class="rule-summary">';
          html += '<p>Applicable rules for this combination:</p>';
          html += '<ul style="margin-top:6px;">';
          html += '<li>Register: ' + escapeHtml(channel.register) + '</li>';
          html += '<li>Adaptation: ' + escapeHtml(adaptationMode) + '</li>';
          channel.rules.forEach(function(r) {
            html += '<li>' + escapeHtml(r) + '</li>';
          });
          html += '</ul>';
          html += '</div>';
        }
        html += '</div>';
        container.innerHTML = html;
      }
    }

    // Init
    document.querySelectorAll('button[data-group]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        selectOption(btn.dataset.group, btn.dataset.value);
      });
    });

    loadFromHash();
    updateDisplay();
  </script>
